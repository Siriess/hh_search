name: Build Windows & macOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  RELEASE_TAG: v${{ github.run_number }}

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: |
          flutter build windows --release `
            --dart-define=HH_CLIENT_ID=${{ secrets.HH_CLIENT_ID }} `
            --dart-define=HH_CLIENT_SECRET=${{ secrets.HH_CLIENT_SECRET }}

      - name: Zip Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath hh_search_windows.zip

      - name: Create Release and upload Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.RELEASE_TAG }} `
            --title "Build #${{ github.run_number }}" `
            --notes "Автоматическая сборка Windows + macOS." `
            hh_search_windows.zip `
            || gh release upload ${{ env.RELEASE_TAG }} hh_search_windows.zip --clobber

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: build-windows
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: |
          flutter build macos --release \
            --dart-define=HH_CLIENT_ID=${{ secrets.HH_CLIENT_ID }} \
            --dart-define=HH_CLIENT_SECRET=${{ secrets.HH_CLIENT_SECRET }}

      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r hh_search_macos.zip hh_search.app
          mv hh_search_macos.zip $GITHUB_WORKSPACE/

      - name: Upload macOS to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ env.RELEASE_TAG }} hh_search_macos.zip --clobber
