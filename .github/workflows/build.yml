name: Build Windows & macOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows
        run: |
          flutter build windows --release `
            --dart-define=HH_CLIENT_ID=${{ secrets.HH_CLIENT_ID }} `
            --dart-define=HH_CLIENT_SECRET=${{ secrets.HH_CLIENT_SECRET }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hh_search_windows
          path: build/windows/x64/runner/Release/
          retention-days: 30

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.9'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build macOS
        run: |
          flutter build macos --release \
            --dart-define=HH_CLIENT_ID=${{ secrets.HH_CLIENT_ID }} \
            --dart-define=HH_CLIENT_SECRET=${{ secrets.HH_CLIENT_SECRET }}

      - name: Zip macOS app
        run: |
          cd build/macos/Build/Products/Release
          zip -r hh_search_macos.zip hh_search.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: hh_search_macos
          path: build/macos/Build/Products/Release/hh_search_macos.zip
          retention-days: 30
